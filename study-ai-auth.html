<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Flow Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0d0514; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); text-align: center; }
        .input-field { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 14px; outline: none; transition: all 0.2s; margin-bottom: 16px; box-sizing: border-box; }
        .input-field:focus { border-color: #8c25f4; background: rgba(255,255,255,0.1); }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #8c25f4; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:hover { background: #711cc9; }
        .btn-secondary { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: rgba(239, 68, 68, 0.9); border-radius: 12px; font-weight: 500; font-size: 14px; z-index: 1000; display: none; }
    </style>
</head>
<body>
    <div id="errorToast" class="toast">Error happens here</div>
    
    <div class="auth-container">
        <h1 class="text-3xl font-black mb-2 tracking-tight">Study Flow Login</h1>
        <p class="text-sm font-medium text-white/50 mb-8 tracking-widest uppercase">Powered by Study AI</p>
        <p class="text-sm text-white/80 mb-8">Sign in to unlock playlists, favorites, and personalized music.</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="email" id="email" class="input-field" placeholder="Email Address" required>
            <input type="password" id="password" class="input-field" placeholder="Password" required>
            
            <button type="submit" id="mainBtn" class="btn-primary">Sign In</button>
            <button type="button" onclick="toggleMode()" id="toggleBtn" class="text-xs text-white/50 hover:text-white mt-4 font-medium tracking-wide">Need an account? Sign Up</button>
        </form>
        
        <div class="my-6 relative flex items-center justify-center">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <span class="relative bg-[#160c23] px-4 text-xs text-white/40 font-bold uppercase tracking-wider rounded-md">Or</span>
        </div>
        
        <button onclick="handleGoogle()" class="btn-secondary">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
            Continue with Google
        </button>
        
        <a href="music.html" class="block mt-6 text-sm text-white/50 hover:text-white transition-colors">Continue as Guest</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDMJt-HXBeCl9iwkK06qFtDHy2mh1UFrIs",
            authDomain: "study-ai-7968d.firebaseapp.com",
            projectId: "study-ai-7968d",
            storageBucket: "study-ai-7968d.firebasestorage.app",
            messagingSenderId: "586728336959",
            appId: "1:586728336959:web:87fa4ff6613d5b3204928a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        let isSignUp = false;
        
        onAuthStateChanged(auth, (user) => {
            if (user && window.location.pathname.includes('study-ai-auth.html')) {
                // Return user back to music.html immediately if logged in
                window.location.href = 'music.html';
            }
        });

        window.toggleMode = function() {
            isSignUp = !isSignUp;
            document.getElementById('mainBtn').textContent = isSignUp ? "Sign Up" : "Sign In";
            document.getElementById('toggleBtn').textContent = isSignUp ? "Already have an account? Sign In" : "Need an account? Sign Up";
        };

        window.showError = function(msg) {
            const toast = document.getElementById('errorToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        };

        window.handleAuth = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('mainBtn');
            const origText = btn.textContent;
            btn.textContent = "Loading...";
            btn.disabled = true;
            
            if (isSignUp) {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => { window.location.href = 'music.html'; })
                    .catch(err => { showError(err.message); btn.textContent = origText; btn.disabled = false; });
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { window.location.href = 'music.html'; })
                    .catch(err => { showError(err.message); btn.textContent = origText; btn.disabled = false; });
            }
        };

        window.handleGoogle = function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then(() => { window.location.href = 'music.html'; })
                .catch(err => showError(err.message));
        };
    </script>
</body>
</html>
